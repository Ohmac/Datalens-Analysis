{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <h2 class="fw-bold mb-1"><i class="bi bi-upload me-2 text-primary"></i>Upload Data</h2>
      <p class="text-muted mb-4">Select a CSV file (max 16 MB) to begin your analysis.</p>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <form method="POST" enctype="multipart/form-data" id="uploadForm" novalidate>
            <div class="upload-area mb-4" id="dropZone">
              <i class="bi bi-cloud-upload display-4 text-primary"></i>
              <p class="mt-2 mb-1 fw-semibold">Drag &amp; drop your CSV here</p>
              <p class="text-muted small">or click to browse</p>
              <input type="file" name="file" id="fileInput" accept=".csv" class="d-none" required />
              <p class="mt-2 text-primary small fw-semibold" id="selectedFileName"></p>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg" id="submitBtn" disabled>
                <i class="bi bi-upload me-2"></i>Upload &amp; Analyze
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="mt-3 text-muted small text-center">
        <i class="bi bi-shield-check me-1"></i>
        Files are stored only for your session and deleted when you upload a new file.
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
  initUploadPage();
</script>
{% endblock %}
